<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discount Bids — Live Packing Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #040810;
    --bg-mid: #080e1c;
    --bg-card: #0a1428;
    --bg-card-hover: #0f1f3d;
    --border: #142040;
    --border-glow: #1e3a6e;
    --gold: #d4a847;
    --gold-bright: #f0c95c;
    --gold-pale: #f5dfa0;
    --gold-dim: #8a6520;
    --blue: #3b82f6;
    --blue-bright: #60a5fa;
    --cyan: #22d3ee;
    --text: #b0c4de;
    --text-dim: #4a6484;
    --text-bright: #e4edf8;
    --text-muted: #2a3e5c;
    --radius: 14px;
    --radius-sm: 8px;
    --font-head: 'Chakra Petch', 'Segoe UI', system-ui, sans-serif;
    --font-body: 'Rajdhani', 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'Consolas', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--bg-deep);
    color: var(--text);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 30%, black 20%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 30%, black 20%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 50% 40% at 15% 5%, rgba(59,130,246,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 35% at 85% 15%, rgba(212,168,71,0.05) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .page-wrap {
    position: relative; z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 36px 28px 60px;
  }
  /* Header */
  .header { margin-bottom: 36px; }
  .header-top { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; }
  .logo {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, #0a1a3a 0%, #122452 40%, #1a3570 100%);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 24px rgba(59,130,246,0.25), 0 0 60px rgba(59,130,246,0.08);
    position: relative;
  }
  .logo::after { content: ''; position: absolute; inset: -2px; border-radius: 12px; border: 1px solid rgba(59,130,246,0.3); }
  h1 {
    font-family: var(--font-head); font-size: 24px; font-weight: 700;
    background: linear-gradient(135deg, var(--gold-bright) 0%, var(--gold-pale) 40%, var(--gold) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    letter-spacing: 2px; text-transform: uppercase;
  }
  .subtitle { color: var(--text-dim); font-size: 15px; font-weight: 500; padding-left: 62px; }
  .header-line { height: 1px; background: linear-gradient(90deg, var(--gold-dim), rgba(212,168,71,0.3), transparent 80%); margin-top: 18px; }
  /* Status bar */
  .status-bar {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 12px 18px; background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 24px;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.6); flex-shrink: 0; }
  .status-dot.waiting { background: var(--text-muted); box-shadow: none; }
  .status-text { font-family: var(--font-head); font-size: 12px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
  .status-date { font-family: var(--font-mono); font-size: 12px; color: var(--gold); margin-left: auto; }
  .btn {
    background: linear-gradient(135deg, var(--blue) 0%, #2563eb 60%, #1d4ed8 100%);
    color: #fff; border: none; border-radius: var(--radius-sm); padding: 8px 18px;
    font-size: 12px; font-family: var(--font-head); font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
    transition: all 0.25s; box-shadow: 0 2px 14px rgba(59,130,246,0.3);
  }
  .btn:hover { box-shadow: 0 4px 24px rgba(59,130,246,0.4); transform: translateY(-1px); }
  /* Summary */
  .summary { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .summary-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px 20px; flex: 1; min-width: 120px; position: relative; overflow: hidden;
  }
  .summary-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--gold-dim), var(--gold-bright), var(--gold-dim)); }
  .summary-num { font-family: var(--font-head); font-size: 28px; font-weight: 700; color: var(--gold-bright); }
  .summary-label { font-family: var(--font-head); font-size: 11px; color: var(--text-dim); margin-top: 2px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  /* Shipment cards */
  .shipment {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    margin-bottom: 14px; display: flex; overflow: hidden;
    animation: fadeUp .45s ease both;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
  .shipment:hover { border-color: var(--border-glow); box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
  .shipment-info { flex: 1; padding: 20px 22px; min-width: 0; }
  .shipment-label-panel {
    width: 300px; min-width: 300px;
    border-left: 1px solid var(--border);
    background: var(--bg-mid);
    display: flex; align-items: center; justify-content: center;
    padding: 14px;
  }
  .shipment-label-panel img {
    max-width: 100%; max-height: 400px;
    border-radius: 6px; box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    cursor: pointer; transition: transform 0.2s;
  }
  .shipment-label-panel img:hover { transform: scale(1.02); }
  .no-label-msg { font-family: var(--font-head); font-size: 12px; color: #f87171; letter-spacing: 0.5px; text-align: center; padding: 12px 20px; background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.15); border-radius: var(--radius-sm); }
  .shipment-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
  .shipment-num { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); letter-spacing: 0.5px; margin-bottom: 6px; }
  .recipient-name { font-family: var(--font-head); font-size: 18px; font-weight: 700; color: var(--text-bright); }
  .recipient-user { font-family: var(--font-mono); font-size: 12px; color: var(--blue-bright); margin-top: 2px; }
  .recipient-address { font-size: 13px; color: var(--text-dim); margin-top: 6px; line-height: 1.5; }
  .box-badge {
    font-family: var(--font-head); font-size: 11px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; padding: 5px 10px; border-radius: 6px; white-space: nowrap; flex-shrink: 0;
  }
  .box-poly { background: rgba(59,130,246,0.1); color: var(--blue-bright); border: 1px solid rgba(59,130,246,0.25); }
  .box-small { background: rgba(34,197,94,0.1); color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }
  .box-medium { background: rgba(212,168,71,0.1); color: var(--gold-bright); border: 1px solid rgba(212,168,71,0.25); }
  .box-large { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
  .box-unknown { background: rgba(74,100,132,0.1); color: var(--text-dim); border: 1px solid rgba(74,100,132,0.25); }
  .split-badge { display: inline-block; font-family: var(--font-mono); font-size: 10px; color: var(--cyan); background: rgba(34,211,238,0.08); border: 1px solid rgba(34,211,238,0.2); border-radius: 4px; padding: 2px 8px; margin-bottom: 4px; }
  .items-list { display: flex; flex-direction: column; gap: 5px; }
  .item-row { display: flex; align-items: center; gap: 10px; padding: 7px 10px; background: rgba(255,255,255,0.02); border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.04); }
  .item-qty { font-family: var(--font-mono); font-size: 12px; color: var(--gold); font-weight: 600; min-width: 24px; }
  .item-name { font-size: 14px; font-weight: 600; color: var(--text-bright); flex: 1; }
  .item-nums { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); }
  /* Empty / loading states */
  .empty-state { text-align: center; padding: 80px 20px; }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-title { font-family: var(--font-head); font-size: 18px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
  .empty-sub { font-size: 14px; color: var(--text-muted); margin-top: 8px; }
  /* Lightbox */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(4,8,16,0.95); z-index: 1000; align-items: center; justify-content: center; cursor: zoom-out; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; box-shadow: 0 0 60px rgba(0,0,0,0.8); }
  @media (max-width: 750px) {
    .shipment { flex-direction: column; }
    .shipment-label-panel { width: 100%; min-width: 0; border-left: none; border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>
<div class="page-wrap">
  <div class="header">
    <div class="header-top">
      <div class="logo">📦</div>
      <h1>Discount Bids</h1>
    </div>
    <div class="subtitle">Live Packing Guide</div>
    <div class="header-line"></div>
  </div>

  <div class="status-bar">
    <div class="status-dot waiting" id="statusDot"></div>
    <div class="status-text" id="statusText">Loading...</div>
    <div class="status-date" id="statusDate"></div>
    <button class="btn" onclick="loadManifest()">🔄 Refresh</button>
  </div>

  <div id="content"></div>
</div>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
  <img id="lightboxImg" src="" alt="Label">
</div>

<script>
const BACKEND = 'https://discount-bids-backend.onrender.com';

function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}

function boxClass(label) {
  if (!label) return 'box-unknown';
  const l = label.toLowerCase();
  if (l.includes('poly')) return 'box-poly';
  if (l.includes('small')) return 'box-small';
  if (l.includes('medium')) return 'box-medium';
  if (l.includes('large')) return 'box-large';
  return 'box-unknown';
}

async function loadManifest() {
  const dot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const statusDate = document.getElementById('statusDate');
  const content = document.getElementById('content');

  dot.className = 'status-dot waiting';
  statusText.textContent = 'Loading...';

  try {
    const res = await fetch(BACKEND + '/manifest');
    const data = await res.json();

    if (data.empty || !data.shipments) {
      dot.className = 'status-dot waiting';
      statusText.textContent = 'Waiting for manifest to be published';
      statusDate.textContent = '';
      content.innerHTML = `<div class="empty-state">
        <div class="empty-icon">📭</div>
        <div class="empty-title">No Manifest Yet</div>
        <div class="empty-sub">Generate and publish from the label maker to see it here.</div>
      </div>`;
      return;
    }

    dot.className = 'status-dot';
    statusText.textContent = `${data.count} shipment${data.count !== 1 ? 's' : ''} — ${data.sheetName || data.date}`;
    const pub = data.publishedAt ? new Date(data.publishedAt) : null;
    statusDate.textContent = pub ? 'Published ' + pub.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }) : '';

    // Summary
    let html = `<div class="summary">
      <div class="summary-card"><div class="summary-num">${data.count}</div><div class="summary-label">Total Shipments</div></div>
      <div class="summary-card"><div class="summary-num">${data.shipments.filter(s => s.labelImage).length}</div><div class="summary-label">Labels Matched</div></div>
    </div>`;

    // Shipment cards
    data.shipments.forEach((s, i) => {
      const al = [s.addr1, s.addr2].filter(Boolean).join(', ');
      const cl = `${s.city}, ${s.state} ${s.zip}`;

      // Group items
      const groups = {};
      (s.displayItems || []).forEach(it => {
        if (!groups[it.itemName]) groups[it.itemName] = { itemName: it.itemName, auctions: [], qty: 0 };
        groups[it.itemName].auctions.push(it.auctionNum);
        groups[it.itemName].qty++;
      });
      const ih = Object.values(groups).map(g =>
        `<div class="item-row"><span class="item-qty">${g.qty}×</span><span class="item-name">${g.itemName}</span><span class="item-nums">${g.auctions.map(a => '#' + a).join(', ')}</span></div>`
      ).join('');

      const splitBadge = s.splitInfo ? `<div class="split-badge">${s.splitInfo}</div>` : '';

      const labelHtml = s.labelImage
        ? `<div class="shipment-label-panel"><img src="${s.labelImage}" alt="Label" onclick="event.stopPropagation(); openLightbox(this.src)"></div>`
        : `<div class="shipment-label-panel"><div class="no-label-msg">⚠️ No label matched</div></div>`;

      const boxBadge = s.boxLabel ? `<span class="box-badge ${s.boxCls || 'box-unknown'}">${s.boxLabel}</span>` : '';

      html += `<div class="shipment" style="animation-delay:${0.03 * i}s">
        <div class="shipment-info">
          <div class="shipment-header">
            <div>
              <div class="shipment-num">Shipment ${i + 1} / ${data.count}${s.labelPage ? ' · Label p' + s.labelPage : ''}</div>
              ${splitBadge}
              <div class="recipient-name">${s.name}</div>
              <div class="recipient-user">@${s.username}</div>
              <div class="recipient-address">${al}<br>${cl}</div>
            </div>
            ${boxBadge}
          </div>
          <div class="items-list">${ih}</div>
        </div>
        ${labelHtml}
      </div>`;
    });

    content.innerHTML = html;
  } catch (err) {
    dot.className = 'status-dot waiting';
    statusText.textContent = 'Error loading manifest';
    statusDate.textContent = '';
    content.innerHTML = `<div class="empty-state">
      <div class="empty-icon">⚠️</div>
      <div class="empty-title">Failed to Load</div>
      <div class="empty-sub">${err.message}</div>
    </div>`;
  }
}

loadManifest();
</script>
</body>
</html>
